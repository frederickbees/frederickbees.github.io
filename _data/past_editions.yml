# Past festival editions — shown on /past-editions/.
- year: 2025
  theme: "Honey, hives, and held conversations"
  highlights: >-
    Fifth year at the Great Frederick Fair. Record turnout at the
    observation hive, and the honey judging had its largest field yet.

- year: 2024
  theme: "Plant one thing for pollinators"
  highlights: >-
    Partnered with three county libraries to distribute 2,000 packs of
    native wildflower seed.

- year: 2023
  theme: "Mentors and first-year hives"
  highlights: >-
    Our mentorship program crossed 80 active pairings for the first time.

- year: 2022
  theme: "Back in person"
  highlights: >-
    Our first full in-person year after the pandemic reshuffle. Two
    visiting master beekeepers, one memorably emotional potluck.

- year: 2021
  theme: "Hybrid and hopeful"
  highlights: >-
    Virtual meetings plus small-group field days.
