- q: Do I need to own bees to join?
  a: >-
    Not at all. Plenty of our members join a full year or two before
    getting their first hive — some never get one and just love the
    community and the honey tastings. Curiosity is the only prerequisite.

- q: How much does it cost to start a hive?
  a: >-
    Plan on $350–$500 for your first year: a hive, a package or nuc of
    bees, basic tools, and protective gear. After that it's mostly just
    time, curiosity, and the occasional replacement hive tool you dropped
    in the tall grass.

- q: Are honey bees aggressive?
  a: >-
    Honey bees are generally gentle. They sting defensively — usually
    near the hive — and they die when they do, so they really don't want
    to. A swarm in open air is the calmest version of a bee you will ever meet.

- q: Can I keep bees in the city or in my back yard?
  a: >-
    In most of Frederick County, yes — with some common-sense placement.
    Maryland requires you to register your apiary with the state (it's
    free) and we'll walk you through the neighbor-friendly setup at any meeting.

- q: What's the extractor policy?
  a: >-
    Members can borrow the club's honey extractor for a small donation.
    You pick it up clean, you return it clean. Full details are on the
    [Extractor Use Policy](/extractor-policy/) page.

- q: How do I report a swarm or unwanted hive?
  a: >-
    Use our **[Bee Removal form](/bee-removal/)** — it goes straight to
    a volunteer who can usually respond within 24 hours during swarm
    season. Please don't spray.

- q: What's the difference between honey bees and wasps/hornets?
  a: >-
    Honey bees are fuzzy, amber-and-brown, and live in shared hives.
    Wasps, hornets, and yellow jackets are glossy, often boldly striped,
    and sometimes nest in the ground or in wall cavities. We only handle
    honey bees — for wasps, call a licensed pest-control service.
